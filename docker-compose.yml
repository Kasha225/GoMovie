version: '3.9'

services:
  db:
    image: postgres:15
    container_name: fullfilms_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/movies.csv:/docker-entrypoint-initdb.d/movies.csv
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: fullfilms_app
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata: